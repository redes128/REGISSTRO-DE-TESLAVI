<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Contable Verde</title>

<style>
:root{
  --verde-1:#065f46;  /* oscuro */
  --verde-2:#059669;  /* principal */
  --verde-3:#10b981;  /* claro */
  --bg:#ecfdf5;       /* fondo suave */
}

body{margin:0;font-family:Arial;background:var(--bg);}
header{
  background:var(--verde-1);
  color:white;
  padding:15px;
  text-align:center;
}
.container{padding:20px;}
.box{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
form{display:grid;gap:10px;}
input,select,button{
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  background:var(--verde-2);
  color:white;
  border:none;
  cursor:pointer;
}
button:hover{background:var(--verde-3);}

table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:8px;text-align:left;}
th{background:#d1fae5;}

.hidden{display:none;}

.loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
z-index:999;
}
</style>
</head>

<body>

<header>
<h1>Sistema Contable Institucional</h1>
<button onclick="logout()">Cerrar sesión</button>
</header>

<div id="loader" class="loader hidden">Procesando...</div>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="box">
<h2>Login</h2>
<form id="loginForm">
<input type="email" id="email" placeholder="Correo" required>
<input type="password" id="password" placeholder="Contraseña" required>
<button type="submit">Ingresar</button>
</form>
<p id="error"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<!-- ESTUDIANTES -->
<div class="box" id="adminSection">
<h2>Registrar / Editar Estudiante</h2>

<form id="studentForm">
<input type="text" id="nombre" placeholder="Nombre" required>
<input type="text" id="apellido" placeholder="Apellido" required>
<input type="text" id="ci" placeholder="CI" required>
<input type="text" id="celular" placeholder="Celular" required>

<select id="semestre">
<option value="1">Semestre 1</option>
<option value="2">Semestre 2</option>
<option value="3">Semestre 3</option>
<option value="4">Semestre 4</option>
</select>

<select id="turno">
<option value="mañana">Mañana</option>
<option value="noche">Noche</option>
</select>

<button type="button" onclick="abrirModal('crear')">Guardar</button>
</form>
</div>

<!-- PAGOS -->
<div class="box">
<h2>Registrar Pago</h2>

<form id="paymentForm">
<select id="studentSelect"></select>

<select id="method">
<option value="efectivo">Efectivo</option>
<option value="qr">QR</option>
</select>

<input type="text" id="recibo" placeholder="N° Recibo" required>

<select id="cuota">
<option value="1">Cuota 1</option>
<option value="2">Cuota 2</option>
<option value="3">Cuota 3</option>
<option value="4">Cuota 4</option>
<option value="total">Total</option>
</select>

<input type="number" id="amount" placeholder="Monto" required>

<button type="button" onclick="abrirModal('pago')">Guardar Pago</button>
</form>
</div>

<!-- TABLA ESTUDIANTES -->
<div class="box">
<h2>Estudiantes</h2>
<table>
<thead>
<tr>
<th>Nombre</th>
<th>CI</th>
<th>Semestre</th>
<th>Turno</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaEstudiantes"></tbody>
</table>
</div>

<!-- TABLA PAGOS -->
<div class="box">
<h2>Pagos</h2>
<table>
<thead>
<tr>
<th>Nombre</th>
<th>CI</th>
<th>Método</th>
<th>Cuota</th>
<th>Monto</th>
</tr>
</thead>
<tbody id="tablaPagos"></tbody>
</table>
</div>

</div>
</div>

<!-- MODAL -->
<div id="authModal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;">
<div style="background:white;padding:20px;border-radius:10px;width:300px;">
<h3>Confirmar Acción</h3>
<input type="password" id="authPass" placeholder="Contraseña">
<button onclick="confirmarAccion()">Confirmar</button>
<button onclick="cerrarModal()">Cancelar</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, EmailAuthProvider, reauthenticateWithCredential }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, getDoc, query, where }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD1yXl0JdY7LQb3yNjLAUIFSCH5ve-CCrg",
  authDomain: "registro-teslavi.firebaseapp.com",
  projectId: "registro-teslavi",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let rolUsuario="";
let accionPendiente=null;
let estudianteEditando=null;

const showLoader=()=>loader.classList.remove("hidden");
const hideLoader=()=>loader.classList.add("hidden");

/* LOGIN */
loginForm.addEventListener("submit", async e=>{
e.preventDefault();
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
}catch(err){ error.textContent=err.message; }
});

/* SESION */
onAuthStateChanged(auth, async user=>{
if(user){
loginBox.classList.add("hidden");
dashboard.classList.remove("hidden");

/* obtener rol eficiente */
const q=query(collection(db,"usuarios"),where("email","==",user.email));
const snap=await getDocs(q);
snap.forEach(doc=>rolUsuario=doc.data().rol);

/* restricción */
if(rolUsuario!=="admin") adminSection.style.display="none";

cargarEstudiantes();
cargarPagos();
}else{
loginBox.classList.remove("hidden");
dashboard.classList.add("hidden");
}
});

window.logout=()=>signOut(auth);

/* MODAL */
window.abrirModal=(accion)=>{
if(rolUsuario!=="admin") return alert("Solo administrador");
accionPendiente=accion;
authModal.classList.remove("hidden");
};

window.cerrarModal=()=>authModal.classList.add("hidden");

/* CONFIRMAR */
window.confirmarAccion=async()=>{
const user=auth.currentUser;
const cred=EmailAuthProvider.credential(user.email,authPass.value);

try{
await reauthenticateWithCredential(user,cred);

if(accionPendiente==="crear") await guardarEstudiante();
if(accionPendiente==="editar") await actualizarEstudiante();
if(accionPendiente==="pago") await guardarPago();

cerrarModal();
}catch{
alert("Contraseña incorrecta");
}
};

/* ESTUDIANTES */
async function guardarEstudiante(){
if(ci.value.length<5) return alert("CI inválido");

showLoader();
await addDoc(collection(db,"students"),{
nombre:nombre.value,
apellido:apellido.value,
ci:ci.value,
celular:celular.value,
semestre:semestre.value,
turno:turno.value
});
hideLoader();
studentForm.reset();
cargarEstudiantes();
}

window.editar=(id,data)=>{
estudianteEditando=id;
nombre.value=data.nombre;
apellido.value=data.apellido;
ci.value=data.ci;
celular.value=data.celular;
semestre.value=data.semestre;
turno.value=data.turno;
abrirModal("editar");
};

async function actualizarEstudiante(){
showLoader();
await updateDoc(doc(db,"students",estudianteEditando),{
nombre:nombre.value,
apellido:apellido.value,
ci:ci.value,
celular:celular.value,
semestre:semestre.value,
turno:turno.value
});
hideLoader();
cargarEstudiantes();
}

async function cargarEstudiantes(){
const snap=await getDocs(collection(db,"students"));
tablaEstudiantes.innerHTML="";
studentSelect.innerHTML="";

snap.forEach(docu=>{
const s=docu.data();

studentSelect.innerHTML+=`<option value="${docu.id}">${s.nombre} ${s.apellido}</option>`;

tablaEstudiantes.innerHTML+=`
<tr>
<td>${s.nombre} ${s.apellido}</td>
<td>${s.ci}</td>
<td>${s.semestre}</td>
<td>${s.turno}</td>
<td>${rolUsuario==="admin"?`<button onclick='editar("${docu.id}",${JSON.stringify(s)})'>Editar</button>`:"—"}</td>
</tr>`;
});
}

/* PAGOS */
async function guardarPago(){
const ref=doc(db,"students",studentSelect.value);
const snap=await getDoc(ref);
const s=snap.data();

showLoader();
await addDoc(collection(db,"pagos"),{
nombre:s.nombre+" "+s.apellido,
ci:s.ci,
method:method.value,
cuota:cuota.value,
amount:amount.value
});
hideLoader();

cargarPagos();
}

async function cargarPagos(){
tablaPagos.innerHTML="";
const snap=await getDocs(collection(db,"pagos"));

snap.forEach(doc=>{
const p=doc.data();
tablaPagos.innerHTML+=`
<tr>
<td>${p.nombre}</td>
<td>${p.ci}</td>
<td>${p.method}</td>
<td>${p.cuota}</td>
<td>${p.amount}</td>
</tr>`;
});
}

</script>

</body>
</html>
