<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Contable Institucional</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6f9;}
header { background:#1e3a8a; color:white; padding:15px; text-align:center;}
.container { padding:20px;}
.login-box { max-width:400px; margin:auto; background:white; padding:20px; border-radius:10px;}
form { display:grid; gap:10px;}
input,select,button{ padding:10px;}
button{ background:#2563eb; color:white; border:none; cursor:pointer;}
button:hover{ background:#1d4ed8;}
table{ width:100%; border-collapse:collapse; background:white;}
th,td{ border:1px solid #ccc; padding:8px;}
th{ background:#e5e7eb;}
.estado-pagado{ color:green; font-weight:bold;}
.estado-pendiente{ color:orange;}
.estado-retirado{ color:red;}
.hidden{ display:none;}
</style>

</head>

<body>

<header>
<h1>Sistema Contable Institucional</h1>
<button onclick="logout()">Cerrar sesión</button>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="login-box">
<h2>Inicio de Sesión</h2>

<form id="loginForm">
<input type="email" id="email" placeholder="Correo" required>
<input type="password" id="password" placeholder="Contraseña" required>

<select id="rol">
<option value="admin">Administrador</option>
<option value="visualizador">Visualizador</option>
</select>

<button type="submit">Ingresar</button>
</form>

<p id="error"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<h2>Registrar Pago</h2>

<form id="paymentForm">

<input type="text" id="student" placeholder="Nombre estudiante" required>

<select id="method">
<option value="efectivo">Efectivo</option>
<option value="qr">QR</option>
</select>

<input type="text" id="recibo" placeholder="N° Recibo" required>

<select id="cuota">
<option value="1">Cuota 1</option>
<option value="2">Cuota 2</option>
<option value="3">Cuota 3</option>
<option value="4">Cuota 4</option>
<option value="total">Total</option>
</select>

<input type="number" id="amount" placeholder="Monto" required>

<button type="submit">Guardar Pago</button>

</form>

<h2>Pagos Registrados</h2>

<table>
<thead>
<tr>
<th>Estudiante</th>
<th>Método</th>
<th>Recibo</th>
<th>Cuota</th>
<th>Monto</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

</div>

<!-- FIREBASE + LOGICA -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

/* 🔥 TU CONFIG (YA CORRECTA) */
const firebaseConfig = {
  apiKey: "AIzaSyD1yXl0JdY7LQb3yNjLAUIFSCH5ve-CCrg",
  authDomain: "registro-teslavi.firebaseapp.com",
  projectId: "registro-teslavi",
  storageBucket: "registro-teslavi.firebasestorage.app",
  messagingSenderId: "688155102791",
  appId: "1:688155102791:web:3c7dc218c07c744d75ab62"
};

/* INICIALIZAR */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
loginForm.addEventListener("submit", async (e)=>{
e.preventDefault();

try{
await signInWithEmailAndPassword(auth, email.value, password.value);
}catch(err){
error.textContent = "Error: " + err.message;
}
});

/* SESION */
onAuthStateChanged(auth, user=>{
if(user){
loginBox.classList.add("hidden");
dashboard.classList.remove("hidden");
cargarPagos();
}else{
loginBox.classList.remove("hidden");
dashboard.classList.add("hidden");
}
});

/* LOGOUT */
window.logout = ()=> signOut(auth);

/* REGISTRAR PAGO */
paymentForm.addEventListener("submit", async (e)=>{
e.preventDefault();

await addDoc(collection(db,"pagos"),{
student: student.value,
method: method.value,
recibo: recibo.value,
cuota: cuota.value,
amount: amount.value,
fecha: new Date()
});

alert("Pago guardado");
paymentForm.reset();
cargarPagos();
});

/* CARGAR TABLA */
async function cargarPagos(){
tabla.innerHTML = "";

const datos = await getDocs(collection(db,"pagos"));

datos.forEach(doc=>{
const d = doc.data();

tabla.innerHTML += `
<tr>
<td>${d.student}</td>
<td>${d.method}</td>
<td>${d.recibo}</td>
<td>${d.cuota}</td>
<td>${d.amount}</td>
</tr>
`;
});
}

</script>

</body>
</html>
